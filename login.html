<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar - Biblioteca CEBAS 2</title>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-16.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/estilos.css">
</head>
<body>

  <!-- ═══ Toast Container ═══ -->
  <div id="toast-container"></div>

  <!-- ═══════════════════════════════════════
       PANTALLA DE LOGIN
  ════════════════════════════════════════ -->
  <div class="login-overlay">
    <div class="login-card">
      <img class="login-logo" src="assets/logo-cebas48.png" alt="CEBAS">
      <h1 class="login-title">Biblioteca - CEBAS 2</h1>
      <p class="login-subtitle">Ingres&aacute; para continuar</p>

      <!-- FORMULARIO LOGIN -->
      <div id="form-login">
        <div class="form-group">
          <label>Email</label>
          <input class="form-input" id="login-usuario" type="email" placeholder="usuario@correo.com">
        </div>
        <div class="form-group" style="margin-top:12px">
          <label>Contrase&ntilde;a</label>
          <input class="form-input" id="login-password" type="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;">
        </div>
        <button class="btn btn-primary btn-block" style="margin-top:1.25rem" onclick="Auth.login()">Ingresar</button>
      </div>

    </div>
  </div>

  <!-- Overlay de carga -->
  <div id="loading-overlay" style="display:none;position:fixed;inset:0;z-index:500;background:rgba(255,255,255,0.7);align-items:center;justify-content:center;font-family:'Montserrat',sans-serif;font-size:14px;gap:10px">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1c3e56" stroke-width="2" stroke-linecap="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"><animateTransform attributeName="transform" type="rotate" from="0 12 12" to="360 12 12" dur="0.8s" repeatCount="indefinite"/></path></svg>
    Cargando...
  </div>

  <script type="module" src="assets/login.js"></script>

</body>
</html>
